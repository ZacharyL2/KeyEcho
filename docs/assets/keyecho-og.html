<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fragment+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #ebebeb;
        --sheet: #fff;
        --ink: #1b1b1b;
        --body: #2e2e2e;
        --mute: #6e6e6e;
        --line: #c9c9c9;
        --dark: #2e2e2e;
        --red: #b71a18;
        --tint: #f6e2e1;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 2560px;
        height: 1280px;
      }
      body {
        background: var(--paper);
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        color: var(--body);
        padding: 56px 64px;
      }
      .mono {
        font-family: 'Fragment Mono', Consolas, monospace;
        letter-spacing: 0.12em;
        font-size: 38px;
        color: var(--mute);
      }
      .sheet {
        width: 100%;
        height: 100%;
        background: var(--sheet);
        border: 3px solid var(--dark);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        padding: 72px 100px 0;
      }
      .hdr {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 64px;
      }
      .hdr-left {
        display: flex;
        align-items: center;
        gap: 44px;
      }
      .logo {
        width: 136px;
        height: 136px;
      }
      .wordmark {
        font-size: 96px;
        font-weight: 700;
        letter-spacing: -0.01em;
        color: var(--ink);
      }
      h1 {
        font-size: 124px;
        line-height: 1.12;
        font-weight: 700;
        letter-spacing: -0.025em;
        color: var(--ink);
        max-width: 18em;
      }
      .hl {
        background: linear-gradient(
          0deg,
          var(--red) 0 14px,
          var(--tint) 14px 100%
        );
        padding: 0 0.08em;
      }
      .fig {
        flex: 1;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 8px 0 0;
      }
      .fig svg {
        width: 100%;
        max-height: 100%;
      }
      .strip {
        display: flex;
        justify-content: space-between;
        border-top: 3px solid var(--line);
        padding: 26px 0 30px;
        margin: 0 -100px;
        padding-left: 100px;
        padding-right: 100px;
      }
    </style>
  </head>
