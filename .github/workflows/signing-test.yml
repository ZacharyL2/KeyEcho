name: Signing Test Build

on:
  push:
    tags:
      - signing-test-*
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to test
        required: true
        default: all
        type: choice
        options:
          - all
          - macos
          - windows
      skip_macos_stapling:
        description: Skip macOS stapling after notarization
        required: true
        default: false
        type: boolean

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CI: true
  RUST_BACKTRACE: short

jobs:
  macos:
    name: macOS signed test (${{ matrix.arch }})
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'macos' }}
    runs-on: macos-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: apple-silicon
            target: aarch64-apple-darwin
          - arch: intel
            target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if ! printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12 2>/dev/null; then
            printf '%s' "$APPLE_CERTIFICATE" | base64 -D > certificate.p12
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            build.keychain
          security find-identity -v -p codesigning build.keychain | grep "Developer ID Application: WaveApp LLC"

      - name: Build, sign, and notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: 'Developer ID Application: WaveApp LLC (8VFAY2H953)'
          NODE_OPTIONS: --max_old_space_size=4096
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          build_args=(--target "${{ matrix.target }}" --ci)
          if [ "${{ inputs.skip_macos_stapling }}" = "true" ]; then
            build_args+=(--skip-stapling)
          fi

          pnpm tauri build "${build_args[@]}"

      - name: Notarize and staple macOS DMGs
        if: ${{ !inputs.skip_macos_stapling }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          shopt -s nullglob
          dmg_paths=(src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg)
          if [ ${#dmg_paths[@]} -eq 0 ]; then
            echo "No DMG files found to notarize."
            exit 1
          fi

          for dmg_path in "${dmg_paths[@]}"; do
            echo "Submitting $dmg_path to Apple notarization"
            xcrun notarytool submit "$dmg_path" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait

            xcrun stapler staple "$dmg_path"
            xcrun stapler validate "$dmg_path"
          done

      - name: Verify macOS signature and notarization
        if: ${{ !inputs.skip_macos_stapling }}
        run: |
          app_path="src-tauri/target/${{ matrix.target }}/release/bundle/macos/KeyEcho.app"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          xcrun stapler validate "$app_path"
          spctl --assess --type execute --verbose=4 "$app_path"

          shopt -s nullglob
          dmg_paths=(src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg)
          if [ ${#dmg_paths[@]} -eq 0 ]; then
            echo "No DMG files found to verify."
            exit 1
          fi

          for dmg_path in "${dmg_paths[@]}"; do
            codesign --verify --strict --verbose=2 "$dmg_path"
            xcrun stapler validate "$dmg_path"
            spctl --assess --type open --context context:primary-signature --verbose=4 "$dmg_path"
          done

      - name: Upload macOS signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: keyecho-macos-${{ matrix.arch }}-signed-test
          if-no-files-found: error
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig

  windows:
    name: Windows signed test (${{ matrix.arch }})
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'windows' }}
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            target: x86_64-pc-windows-msvc
          - arch: arm64
            target: aarch64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Azure Artifact Signing CLI
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $source = Join-Path $env:RUNNER_TEMP "artifact-signing-cli"
          git clone https://github.com/Levminer/artifact-signing-cli $source
          git -C $source checkout c586ee822d368d1a6b6c924eb2b5403b568d0473

          $main = Join-Path $source "src\main.rs"
          $content = Get-Content $main -Raw
          $old = @'
                  "-p",
                  args.azure_client_secret
          '@
          $new = @'
                  format!("--password={}", args.azure_client_secret)
          '@
          if (-not $content.Contains($old)) {
            throw "Artifact Signing CLI Azure login patch target was not found."
          }
          $content.Replace($old, $new) | Set-Content $main -Encoding utf8

          cargo install --locked --path $source
          "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Check Azure Artifact Signing CLI
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $signer = Join-Path $env:USERPROFILE ".cargo\bin\artifact-signing-cli.exe"
          if (-not (Test-Path $signer)) {
            throw "Missing Artifact Signing CLI at $signer"
          }
          & $signer --help

      - name: Create Windows signing config
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $signer = Join-Path $env:USERPROFILE ".cargo\bin\artifact-signing-cli.exe"
          if (-not (Test-Path $signer)) {
            throw "Missing Artifact Signing CLI at $signer"
          }

          $signScript = Join-Path $env:RUNNER_TEMP "keyecho-windows-sign.ps1"
          $signScriptLines = @(
            '$ErrorActionPreference = "Stop"',
            '',
            '$file = $args[0]',
            'if (-not (Test-Path $file)) {',
            '  throw "Missing file to sign: $file"',
            '}',
            '',
            '$signer = Join-Path $env:USERPROFILE ".cargo\bin\artifact-signing-cli.exe"',
            'if (-not (Test-Path $signer)) {',
            '  throw "Missing Artifact Signing CLI at $signer"',
            '}',
            '',
            '$endpoint = $env:AZURE_CODESIGN_ENDPOINT.Trim()',
            '$account = $env:AZURE_CODESIGN_ACCOUNT_NAME.Trim()',
            '$profile = $env:AZURE_CODESIGN_CERT_PROFILE_NAME.Trim()',
            '',
            'Write-Host "Signing $file with Azure Artifact Signing profile $profile"',
            '& $signer -e $endpoint -a $account -c $profile -d "KeyEcho" $file',
            'if ($LASTEXITCODE -ne 0) {',
            '  throw "Artifact Signing CLI failed with exit code $LASTEXITCODE"',
            '}'
          )
          $signScriptLines | Set-Content $signScript -Encoding utf8

          $signCommand = "powershell -NoProfile -ExecutionPolicy Bypass -File $signScript %1"
          $config = @{
            bundle = @{
              windows = @{
                signCommand = $signCommand
              }
            }
          } | ConvertTo-Json -Depth 6
          $config | Set-Content "src-tauri/tauri.windows.signing-test.conf.json" -Encoding utf8

      - name: Preflight Azure Artifact Signing
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CODESIGN_ENDPOINT: ${{ secrets.AZURE_CODESIGN_ENDPOINT }}
          AZURE_CODESIGN_ACCOUNT_NAME: ${{ secrets.AZURE_CODESIGN_ACCOUNT_NAME }}
          AZURE_CODESIGN_CERT_PROFILE_NAME: ${{ secrets.AZURE_CODESIGN_CERT_PROFILE_NAME }}
        run: |
          $ErrorActionPreference = "Stop"

          $signer = Join-Path $env:USERPROFILE ".cargo\bin\artifact-signing-cli.exe"
          if (-not (Test-Path $signer)) {
            throw "Missing Artifact Signing CLI at $signer"
          }

          $testExe = Join-Path $env:RUNNER_TEMP "keyecho-signing-preflight.exe"
          Copy-Item "$env:SystemRoot\System32\where.exe" $testExe -Force

          $endpoint = $env:AZURE_CODESIGN_ENDPOINT.Trim()
          $account = $env:AZURE_CODESIGN_ACCOUNT_NAME.Trim()
          $profile = $env:AZURE_CODESIGN_CERT_PROFILE_NAME.Trim()

          Write-Host "Running Azure Artifact Signing preflight for profile $profile"
          & $signer -e $endpoint -a $account -c $profile -d "KeyEcho signing preflight" $testExe
          if ($LASTEXITCODE -ne 0) {
            throw "Artifact Signing CLI preflight failed with exit code $LASTEXITCODE"
          }

          $signature = Get-AuthenticodeSignature $testExe
          $signature | Format-List
          if ($signature.Status -ne "Valid") {
            throw "Preflight signature status is $($signature.Status)"
          }

      - name: Build Windows bundles
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CODESIGN_ENDPOINT: ${{ secrets.AZURE_CODESIGN_ENDPOINT }}
          AZURE_CODESIGN_ACCOUNT_NAME: ${{ secrets.AZURE_CODESIGN_ACCOUNT_NAME }}
          AZURE_CODESIGN_CERT_PROFILE_NAME: ${{ secrets.AZURE_CODESIGN_CERT_PROFILE_NAME }}
          NODE_OPTIONS: --max_old_space_size=4096
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target }} --config src-tauri/tauri.windows.signing-test.conf.json --ci

      - name: Collect Windows installers to verify
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $catalog = Join-Path $env:GITHUB_WORKSPACE "artifact-signing-files.txt"
          $paths = New-Object System.Collections.Generic.List[string]

          $nsisDir = Join-Path $env:GITHUB_WORKSPACE "src-tauri\target\${{ matrix.target }}\release\bundle\nsis"
          if (Test-Path $nsisDir) {
            Get-ChildItem $nsisDir -Filter *.exe | ForEach-Object {
              $relative = $_.FullName.Substring($env:GITHUB_WORKSPACE.Length + 1).Replace('\', '/')
              $paths.Add($relative)
            }
          }

          $uniquePaths = $paths | Sort-Object -Unique
          if (-not $uniquePaths) {
            throw "No Windows NSIS installers found to verify."
          }

          $uniquePaths | Set-Content $catalog
          Get-Content $catalog

      - name: Verify Windows signatures
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Get-Content (Join-Path $env:GITHUB_WORKSPACE "artifact-signing-files.txt") | ForEach-Object {
            $fullPath = Join-Path $env:GITHUB_WORKSPACE ($_ -replace '/', '\')
            $signature = Get-AuthenticodeSignature $fullPath
            Write-Host "${_}: $($signature.Status) - $($signature.SignerCertificate.Subject)"
            if ($signature.Status -ne "Valid") {
              throw "Invalid signature: $fullPath"
            }
          }

      - name: Report Windows app executable signature
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          foreach ($binaryName in @("keyecho.exe", "KeyEcho.exe")) {
            $relative = "src-tauri/target/${{ matrix.target }}/release/$binaryName"
            $fullPath = Join-Path $env:GITHUB_WORKSPACE ($relative -replace '/', '\')
            if (Test-Path $fullPath) {
              $signature = Get-AuthenticodeSignature $fullPath
              Write-Host "${relative}: $($signature.Status) - $($signature.SignerCertificate.Subject)"
            }
          }

      - name: Upload Windows signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: keyecho-windows-${{ matrix.arch }}-signed-test
          if-no-files-found: error
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip.sig
